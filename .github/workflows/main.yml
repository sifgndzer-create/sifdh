name: Debian Linux VPS via Bore

on: [push]

jobs:
  vps-setup:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Launch Debian Linux System
        run: |
          # تشغيل نظام دبيان (Debian 12) مستقل وتجهيز الـ SSH والبايثون
          docker run -d --name debian-vps --net=host debian:latest bash -c "
            apt update && apt install -y openssh-server sudo wget curl python3 python3-pip &&
            echo 'root:Root@123' | chpasswd &&
            mkdir -p /var/run/sshd &&
            echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config &&
            echo 'PasswordAuthentication yes' >> /etc/ssh/sshd_config &&
            /usr/sbin/sshd -D
          "

      - name: Download and Extract Bore
        run: |
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore

      - name: Start Bore Tunnel
        run: |
          echo "===================================================="
          echo "سيرفر Debian 12 جاهز للاتصال!"
          echo "اسم المستخدم: root"
          echo "كلمة المرور: Root@123"
          echo "===================================================="
          
          ./bore local 22 --to bore.pub
