name: Windows RDP via Bore

on: [push]

jobs:
  rdp-setup:
    runs-on: windows-latest
    timeout-minutes: 360 # الحد الأقصى 6 ساعات

    steps:
      - name: Enable RDP and Firewall
        run: |
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          New-NetFirewallRule -DisplayName "Allow RDP via Bore" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389

      - name: Create Admin User
        run: |
          net user kamel007 Kamel@123 /add
          net localgroup administrators kamel007 /add

      - name: Download and Extract Bore
        run: |
          Invoke-WebRequest "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile bore.zip
          Expand-Archive bore.zip -DestinationPath .
          Remove-Item bore.zip

      - name: Start Bore Tunnel
        run: |
          Write-Output "===================================================="
          Write-Output "الرجاء الانتظار لثوانٍ ورؤية الرابط الحي في السطور أدناه"
          Write-Output "اسم المستخدم: kamel007"
          Write-Output "كلمة المرور: Kamel@123"
          Write-Output "===================================================="
          
          # تشغيل الأداة مباشرة في الواجهة للحفاظ على استمرار الجلسة وعرض الرابط تلقائياً
          .\bore.exe local 3389 --to bore.pub
