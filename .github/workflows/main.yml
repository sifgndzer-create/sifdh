name: Windows RDP via Bore

on: [push]

jobs:
  rdp-setup:
    runs-on: windows-latest
    timeout-minutes: 360 # GitHub Free max runtime is 6 hours
    steps:
      - name: Download and extract Bore
        run: |
          $url = "https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile bore.zip
          Expand-Archive bore.zip -DestinationPath "$env:USERPROFILE"
          Remove-Item bore.zip
          Copy-Item "$env:USERPROFILE\bore.exe" "$env:GITHUB_WORKSPACE"

      - name: Enable RDP and Firewall
        run: |
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          New-NetFirewallRule -DisplayName "Allow RDP via Bore" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389

      - name: Create Admin User
        run: |
          net user kamel007 Kamel@123 /add
          net localgroup administrators kamel007 /add

      - name: Start Bore Tunnel
        run: |
          Start-Process -FilePath "$pwd\bore.exe" -ArgumentList "local 3389 --to bore.pub --port 45596" -NoNewWindow -RedirectStandardOutput bore.log
          Start-Sleep -Seconds 10
          Get-Content bore.log -ErrorAction SilentlyContinue

      - name: Output RDP Details
        run: |
          Write-Output "============================================"
          Write-Output "|| ✅ RDP CONNECTION DETAILS (Bore)        ||"
          Write-Output "============================================"
          Write-Output "Address: bore.pub:45596"
          Write-Output "Username: kamel007"
          Write-Output "Password: Kamel@123"
          Write-Output "--------------------------------------------"
          Write-Output "Instructions:"
          Write-Output "1. Press Win + R, type 'mstsc' and hit Enter"
          Write-Output "2. Connect to: bore.pub:45596"
          Write-Output "3. Use credentials above"
          Write-Output "============================================"
          while ($true) { Start-Sleep -Seconds 300 }

      - name: Cleanup Bore
        if: always()
        run: |
          Stop-Process -Name "bore" -Force -ErrorAction SilentlyContinue
