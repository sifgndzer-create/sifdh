name: Windows RDP via Pinggy

on: [push]

jobs:
  rdp-setup:
    runs-on: windows-latest
    timeout-minutes: 360 # GitHub Free max runtime is 6 hours
    steps:
      - name: Enable RDP and Firewall
        run: |
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          New-NetFirewallRule -DisplayName "Allow RDP" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389

      - name: Create Admin User
        run: |
          net user kamel007 Kamel@123 /add
          net localgroup administrators kamel007 /add

      - name: Start Pinggy TCP Tunnel
        run: |
          # تشغيل النفق عبر SSH المدمج في ويندوز
          Start-Process -FilePath "ssh" -ArgumentList "-o StrictHostKeyChecking=no -p 443 -R 0:localhost:3389 a.pinggy.io" -NoNewWindow -RedirectStandardOutput pinggy.log
          
          # انتظار واستخراج رابط المنفذ الحقيقي
          $tunnelUrl = $null
          $timeout = 30
          while ($timeout -gt 0 -and -not $tunnelUrl) {
              Start-Sleep -Seconds 3
              $timeout -= 3
              $logContent = Get-Content pinggy.log -ErrorAction SilentlyContinue
              $match = $logContent | Select-String -Pattern "tcp://([a-zA-Z0-9\.\-]+:\d+)"
              if ($match) {
                  $tunnelUrl = $match.Matches.Groups[1].Value
              }
          }
          
          if ($tunnelUrl) {
              Write-Output "============================================"
              Write-Output "|| ✅ RDP CONNECTION DETAILS (Pinggy)      ||"
              Write-Output "============================================"
              Write-Output "Address: $tunnelUrl"
              Write-Output "Username: kamel007"
              Write-Output "Password: Kamel@123"
              Write-Output "--------------------------------------------"
              Write-Output "Instructions:"
              Write-Output "1. Press Win + R, type 'mstsc' and hit Enter"
              Write-Output "2. Connect to: $tunnelUrl"
              Write-Output "3. Use credentials above"
              Write-Output "============================================"
          } else {
              Write-Output "::error::Failed to establish Pinggy tunnel. Log content:"
              Get-Content pinggy.log
              exit 1
          }

      - name: Keep Alive Runner
        run: |
          while ($true) { Start-Sleep -Seconds 300 }

      - name: Cleanup
        if: always()
        run: |
          Stop-Process -Name "ssh" -Force -ErrorAction SilentlyContinue
