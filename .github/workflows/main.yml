name: Linux VPS via Bore

on:
  workflow_dispatch: # 👈 يسمح للتشغيل أوتوماتيكياً عبر البايثون
  push:
    branches: [ "main" ]

jobs:
  vps-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Server Resources & Swap
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Configure SSH and Root User
        run: |
          sudo echo "root:Root@123" | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh restart
          echo "=================================================="
          echo "اسم المستخدم : root"
          echo "كلمة السر    : Root@123"
          echo "=================================================="

      - name: Download and Extract Bore
        run: |
          wget -q https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          sudo mv bore /usr/local/bin/

      - name: Start Bore Tunnel
        run: |
          echo "=================================================="
          bore local 22 --to bore.pub
