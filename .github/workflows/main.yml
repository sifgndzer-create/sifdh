name: Windows RDP via Serveo

on: [push]

jobs:
  rdp-setup:
    runs-on: windows-latest
    timeout-minutes: 360 # الحد الأقصى 6 ساعات

    steps:
      - name: Enable RDP and Firewall
        run: |
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          New-NetFirewallRule -DisplayName "Allow RDP via Serveo" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389

      - name: Create Admin User
        run: |
          net user kamel007 Kamel@123 /add
          net localgroup administrators kamel007 /add

      - name: Start Serveo Tunnel
        run: |
          # بدء تشغيل النفق عبر SSH المدمج في الويندوز واختيار منفذ عشوائي لـ RDP
          $sshProcess = Start-Process -FilePath "ssh" -ArgumentList "-o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R 0:localhost:3389 serveo.net" -NoNewWindow -RedirectStandardOutput serveo.log -PassThru
          
          $tunnelUrl = $null
          $timeout = 40
          while ($timeout -gt 0 -and -not $tunnelUrl) {
              Start-Sleep -Seconds 5
              $timeout -= 5
              if (Test-Path serveo.log) {
                  $logContent = Get-Content serveo.log -Raw
                  if ($logContent -match "serveo\.net:\d+") {
                      $tunnelUrl = $matches[0]
                  }
              }
          }
          
          if (-not $tunnelUrl) {
              Write-Output "::error::Failed to create Serveo tunnel."
              Get-Content serveo.log -ErrorAction SilentlyContinue
              exit 1
          }
          
          Write-Output "============================================"
          Write-Output "|| ✅ RDP CONNECTION DETAILS ||"
          Write-Output "============================================"
          Write-Output "Address: $tunnelUrl"
          Write-Output "Username: kamel007"
          Write-Output "Password: Kamel@123"
          Write-Output "--------------------------------------------"
          Write-Output "Instructions:"
          Write-Output "1. Press Win + R, type 'mstsc' and hit Enter"
          Write-Output "2. Connect to: $tunnelUrl"
          Write-Output "3. Use credentials above"
          Write-Output "============================================"
          
          while ($true) {
              Start-Sleep -Seconds 300
          }
